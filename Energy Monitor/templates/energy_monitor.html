<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; }
        .card { background-color: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.25rem; }
        .value-font { font-family: ui-monospace, monospace; }
        
        .chart-container { position: relative; height: 300px; width: 100%; }
    </style>
</head>
<body class="p-4 md:p-6">
    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
            <h1 class="text-2xl md:text-3xl font-bold">Live Energy Monitor</h1>
            <a href="/history" class="w-full sm:w-auto text-center bg-blue-600 hover:bg-blue-700 transition px-6 py-2.5 rounded-lg font-medium">
                View History
            </a>
        </div>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 md:gap-6 mb-8">
            <div class="card border-l-4 border-blue-500">
                <p class="text-slate-400 text-xs md:text-sm uppercase tracking-wider">Voltage</p>
                <p id="voltage" class="text-xl md:text-3xl font-bold value-font mt-1">0.0V</p>
            </div>
            <div class="card border-l-4 border-green-500">
                <p class="text-slate-400 text-xs md:text-sm uppercase tracking-wider">Power</p>
                <p id="power" class="text-xl md:text-3xl font-bold value-font mt-1">0.0W</p>
            </div>
            <div class="card border-l-4 border-red-500">
                <p class="text-slate-400 text-xs md:text-sm uppercase tracking-wider">Peak</p>
                <p id="peakPower" class="text-xl md:text-3xl font-bold value-font mt-1 text-red-400">0.0W</p>
            </div>
            <div class="card border-l-4 border-yellow-500">
                <p class="text-slate-400 text-xs md:text-sm uppercase tracking-wider">Cost</p>
                <p id="cost" class="text-xl md:text-3xl font-bold value-font mt-1">₱0.00</p>
            </div>
        </div>

        <div class="card">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-2">
                <h2 class="text-base md:text-lg font-semibold text-slate-300">Live Load Profile (Last 10)</h2>
                <button onclick="resetPeak()" class="text-xs bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded-md transition">
                    Reset Peak
                </button>
            </div>
            <div class="chart-container">
                <canvas id="liveChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let savedLabels = JSON.parse(localStorage.getItem('graph_labels')) || [];
        let savedData = JSON.parse(localStorage.getItem('graph_data')) || [];
        let maxPower = parseFloat(localStorage.getItem('peak_val')) || 0.0;

        document.getElementById('peakPower').innerText = maxPower.toFixed(1) + 'W';

        function resetPeak() {
            maxPower = 0.0;
            localStorage.setItem('peak_val', 0);
            document.getElementById('peakPower').innerText = '0.0W';
        }

        const ctx = document.getElementById('liveChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { 
                labels: savedLabels, 
                datasets: [{ 
                    label: 'Watts', 
                    data: savedData, 
                    borderColor: '#3b82f6', 
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 4
                }] 
            },
            options: { 
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                scales: { 
                    y: { beginAtZero: true, grid: { color: '#334155' }, ticks: { color: '#94a3b8', font: { size: 10 } } },
                    x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 10 } } }
                },
                plugins: { legend: { display: false } }
            }
        });

        async function updateData() {
            try {
                const res = await fetch('/data');
                const data = await res.json();
                let displayPower = data.power < 0.8 ? 0.0 : data.power;

                if (displayPower > maxPower) {
                    maxPower = displayPower;
                    document.getElementById('peakPower').innerText = maxPower.toFixed(1) + 'W';
                    localStorage.setItem('peak_val', maxPower);
                }

                document.getElementById('voltage').innerText = data.voltage.toFixed(1) + 'V';
                document.getElementById('power').innerText = displayPower.toFixed(1) + 'W';
                document.getElementById('cost').innerText = '₱' + data.cost.toFixed(2);

                const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                chart.data.labels.push(now);
                chart.data.datasets[0].data.push(displayPower);

                if(chart.data.labels.length > 10) { 
                    chart.data.labels.shift(); 
                    chart.data.datasets[0].data.shift(); 
                }
                chart.update('none'); 

                localStorage.setItem('graph_labels', JSON.stringify(chart.data.labels));
                localStorage.setItem('graph_data', JSON.stringify(chart.data.datasets[0].data));
            } catch (e) { console.error("Update failed", e); }
        }

        window.addEventListener('storage', (e) => {
            if (e.key === 'db_reset_signal') {
                chart.data.labels = [];
                chart.data.datasets[0].data = [];
                resetPeak();
                chart.update();
                localStorage.removeItem('graph_labels');
                localStorage.removeItem('graph_data');
            }
        });

        setInterval(updateData, 2000);
        updateData();
    </script>
</body>
</html>
